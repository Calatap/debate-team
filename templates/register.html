{% extends "layout.html" %}
{% block title %}注册 - 辩论队{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">&#x1f3db;</div>
            <h1>加入辩论队</h1>
            <p class="auth-sub">创建一个新账号</p>
        </div>
        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username"
                       placeholder="2-20个字符" required autofocus>
            </div>
            <div class="form-group">
                <label for="display_name">显示名称（选填）</label>
                <input type="text" id="display_name" name="display_name"
                       placeholder="你的昵称，不填则用用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password"
                       placeholder="至少4位" required>
            </div>
            <div class="form-group">
                <label for="confirm">确认密码</label>
                <input type="password" id="confirm" name="confirm"
                       placeholder="再次输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">&#x1f389; 注 册</button>
        </form>
        <div class="auth-footer">
            已有账号？<a href="{{ url_for('login') }}">去登录</a>
        </div>
    </div>
</div>
{% endblock %}
