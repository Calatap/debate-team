{% extends "layout.html" %}
{% block title %}登录 - 辩论队{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">&#x1f3db;</div>
            <h1>辩论队管理系统</h1>
            <p class="auth-sub">登录你的账号</p>
        </div>
        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username"
                       placeholder="输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password"
                       placeholder="输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">&#x1f512; 登 录</button>
        </form>
        <div class="auth-footer">
            还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
